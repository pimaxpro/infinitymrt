
<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PimaX Infinity Marathon | Kho Lưu Trữ Khoa Học</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .bg-pimax { background-color: #3A7BD5; }
        .text-pimax { color: #3A7BD5; }
    </style>
</head>
<body class="text-slate-800">

    <header class="bg-pimax text-white py-12 shadow-lg">
        <div class="container mx-auto px-6 text-center">
            <h1 class="text-4xl md:text-5xl font-extrabold tracking-tight mb-4">PimaX Infinity Marathon</h1>
            <p class="text-blue-100 font-light text-lg">Hệ thống lưu trữ tài nguyên toán học và khoa học đỉnh cao</p>
        </div>
    </header>

    <main class="container mx-auto px-6 py-12">
        <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-slate-50 border-b border-slate-200">
                        <th class="py-6 px-8 font-semibold text-slate-600">Tên File/Đề Thi</th>
                        <th class="py-6 px-8 font-semibold text-slate-600">Đề Bài (Drive)</th>
                        <th class="py-6 px-8 font-semibold text-slate-600">Lời Giải</th>
                        <th class="py-6 px-8 font-semibold text-slate-600">Bảng Xếp Hạng</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-slate-100">
                    <tr class="hover:bg-blue-50/50 transition">
                        <td class="py-6 px-8 font-medium">Marathon Đề 01 - Đại Số</td>
                        <td class="py-6 px-8">
                            <a href="#" class="inline-flex items-center px-4 py-2 bg-pimax text-white rounded-lg hover:opacity-90 transition">
                                <i class="fas fa-file-pdf mr-2"></i> Tải Đề
                            </a>
                        </td>
                        <td class="py-6 px-8"><a href="#" class="text-pimax hover:underline"><i class="fas fa-pen-nib mr-1"></i> Xem chi tiết</a></td>
                        <td class="py-6 px-8"><a href="#" class="text-pimax hover:underline"><i class="fas fa-trophy mr-1"></i> Bảng xếp hạng</a></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

    <footer class="border-t border-slate-200 mt-12 py-8 text-center text-slate-500">
        <p>&copy; 2026 PimaX Infinity Marathon. Được thiết kế với tinh thần toán học.</p>
    </footer>

</body>
</html>
