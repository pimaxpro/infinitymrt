<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PimaX Infinity Marathon | Kho Lưu Trữ Khoa Học</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        /* Mã màu mới #4080D6 */
        .bg-pimax { background-color: #4080D6; }
        .text-pimax { color: #4080D6; }
        .border-pimax { border-color: #4080D6; }
    </style>
</head>
<body class="flex flex-col min-h-screen text-slate-800">

    <div class="flex-grow">
        <header class="bg-pimax h-36 shadow-lg flex items-center justify-center">
            <a href="https://www.facebook.com/PimaXPro" target="_blank" class="transform transition hover:scale-105">
                <img src="logo.png" alt="PimaX Logo" class="h-24 w-auto object-contain">
            </a>
        </header>

        <div class="flex justify-center gap-4 py-8">
            <a href="https://www.tiktok.com/@pimaxghettoan" target="_blank" 
               class="flex items-center gap-2 px-4 py-2 text-sm border border-slate-300 rounded-lg transition-all duration-300 hover:bg-black hover:text-white hover:border-black min-w-[120px] justify-center">
                <i class="fa-brands fa-tiktok"></i> | TikTok
            </a>
            <a href="https://www.facebook.com/PimaXPro" target="_blank" 
               class="flex items-center gap-2 px-4 py-2 text-sm border border-slate-300 rounded-lg transition-all duration-300 hover:bg-blue-600 hover:text-white hover:border-blue-600 min-w-[120px] justify-center">
                <i class="fa-brands fa-facebook"></i> | Facebook
            </a>
        </div>

        <main class="container mx-auto px-6 pb-12">
            <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
                <table class="w-full text-left border-collapse table-fixed">
                    <thead>
                        <tr class="bg-slate-50 border-b border-slate-200">
                            <th class="py-6 px-8 font-semibold text-slate-600 text-center w-1/4">Tên File/Đề Thi</th>
                            <th class="py-6 px-8 font-semibold text-slate-600 text-center w-1/4">Đề Bài (Drive)</th>
                            <th class="py-6 px-8 font-semibold text-slate-600 text-center w-1/4">Lời Giải</th>
                            <th class="py-6 px-8 font-semibold text-slate-600 text-center w-1/4">Bảng Xếp Hạng</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-slate-100">
                        <tr class="hover:bg-blue-50/50 transition">
                            <td class="py-6 px-8 font-medium text-center">Marathon Đề 01 - Đại Số</td>
                            <td class="py-6 px-8 flex justify-center">
                                <a href="#" class="inline-flex items-center px-4 py-2 bg-pimax text-white rounded-lg hover:opacity-90 transition shadow-sm">
                                    <i class="fas fa-file-pdf mr-2"></i> Tải Đề
                                </a>
                            </td>
                            <td class="py-6 px-8 text-center">
                                <a href="#" class="inline-flex items-center px-4 py-2 bg-white border border-slate-300 text-slate-700 rounded-lg hover:bg-slate-100 hover:border-slate-400 transition shadow-sm">
                                    <i class="fas fa-pen-nib mr-2"></i> Xem Lời Giải
                                </a>
                            </td>
                            <td class="py-6 px-8 text-center">
                                <a href="#" class="inline-flex items-center px-4 py-2 bg-white border border-slate-300 text-slate-700 rounded-lg hover:bg-slate-100 hover:border-slate-400 transition shadow-sm">
                                    <i class="fas fa-trophy mr-2"></i> Xem BXH
                                </a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <footer class="border-t border-slate-200 py-8 text-center text-slate-500 bg-white">
        <p>&copy; 2026 PimaX Infinity Marathon. Được thiết kế với tinh thần toán học.</p>
    </footer>

</body>
</html>
